<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldCam Color Palette Mockups</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0; padding: 24px;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #fff; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
  .palette-tabs { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; }
  .palette-tab {
    padding: 10px 20px; border-radius: 999px; border: 1px solid #333;
    background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s;
  }
  .palette-tab:hover { border-color: #555; color: #fff; }
  .palette-tab.active { border-color: #888; color: #fff; background: #333; }
  .tab-sep { width: 1px; height: 28px; background: #333; margin: 0 4px; flex-shrink: 0; }
  .comparison-bar {
    display: flex; gap: 16px; margin-bottom: 24px; padding: 16px 20px;
    background: #151515; border-radius: 14px; border: 1px solid #222; flex-wrap: wrap;
  }
  .comparison-group { display: flex; flex-direction: column; gap: 4px; }
  .comparison-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }
  .comparison-colors { display: flex; gap: 4px; }
  .comparison-dot { width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
  .brand-note { font-size: 12px; color: #777; margin-bottom: 24px; padding: 10px 16px; background: #151515; border-radius: 10px; border: 1px solid #222; line-height: 1.6; }
  .screens-grid { display: grid; grid-template-columns: repeat(auto-fit, 300px); gap: 24px; justify-content: center; }
  .screen-wrapper { text-align: center; }
  .screen-label { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .phone {
    width: 300px; height: 620px; border-radius: 32px; border: 2px solid #333;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .notch { height: 36px; display: flex; align-items: center; justify-content: center; position: relative; }
  .notch::before { content: ''; width: 80px; height: 5px; border-radius: 3px; background: rgba(128,128,128,0.2); position: absolute; top: 10px; }
  .sc { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .sc::-webkit-scrollbar { display: none; }
</style>
</head>

let active = 'current';

function hex2rgba(h, a) {
  return `rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`;
}

function apply(k) {
  active = k;
  document.querySelectorAll('.palette-tab').forEach(t => t.classList.toggle('active', t.dataset.k === k));
  const p = P[k];
  // note
  const notes = {
    llama: 'LlamaIndex: White bg, monospace font, tight letter-spacing (-0.03em), vibrant gradient accents (cyan/blue/pink/orange), black pill buttons, 12px radius, no shadows.',
    cohere: 'Cohere: Flat and minimal, system-ui font, coral #FF7759 accent, no gradients or shadows, 8px card radius, 6px button radius, neutral grays.',
    openai: 'OpenAI: Ultra-minimal, pill buttons (999px radius), #10A37F green for positive states, soft card shadows, no card borders, 16px radius, generous spacing.',
  };
  document.getElementById('note').innerHTML = notes[p.g] ? `<div class="brand-note">${notes[p.g]}</div>` : '';
  // swatches
  const sw = document.getElementById('swatches');
  const gs = [
    { l:'Brand', c:[...(p.grad?[{h:null,gr:p.grad,n:'Gradient'}]:[]),{h:p.a,n:'Accent'},{h:p.al,n:'Accent Lt'},...(p.ma?[{h:p.ma,n:'Secondary'}]:[]) ]},
    { l:'Backgrounds', c:[{h:p.bg1,n:'Primary'},{h:p.bg2,n:'Secondary'},{h:p.bgc,n:'Card'},{h:p.bge,n:'Elevated'}]},
    { l:'Text', c:[{h:p.t1,n:'Primary'},{h:p.t2,n:'Secondary'},{h:p.tm,n:'Muted'}]},
    { l:'Status', c:[{h:p.ok,n:'Success'},{h:p.err,n:'Error'},{h:p.wrn,n:'Warning'},{h:p.inf,n:'Info'}]},
  ];
  sw.innerHTML = gs.map(g=>`<div class="comparison-group"><div class="comparison-label">${g.l}</div><div class="comparison-colors">${g.c.map(c=>{
    const bg=c.gr?c.gr:c.h; const edge=(c.h==='#FFFFFF'||c.h==='#000000')?'border:1px solid #555':'border:1px solid rgba(255,255,255,0.1)';
    return `<div class="comparison-dot" style="background:${bg};${edge}" title="${c.n}: ${c.h||'gradient'}"></div>`;
  }).join('')}</div></div>`).join('');
  render();
}

function initTabs() {
  const c = document.getElementById('tabs');
  const groups = [
    { keys:['current','copper','sienna','midblue','teal','warmgray','earthtone','lightClean','lightWarm','lightCool','lightNavy'] },
    { keys:['llamaindex'] },
    { keys:['cohereDark','cohereLight'] },
    { keys:['openaiLight','openaiDark'] },
  ];
  groups.forEach((g,i)=>{
    if(i>0){ const s=document.createElement('div'); s.className='tab-sep'; c.appendChild(s); }
    g.keys.forEach(k=>{
      const p=P[k], t=document.createElement('div');
      t.className='palette-tab'+(k===active?' active':''); t.dataset.k=k;
      const dot = p.grad ? `background:${p.grad}` : `background:${p.a}`;
      const bdr = (p.a==='#000000')?';border:1px solid #555':'';
      t.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:5px;${dot}${bdr};margin-right:6px;vertical-align:middle;"></span>${p.name}`;
      t.onclick=()=>apply(k); c.appendChild(t);
    });
  });
}

            <div style="font-size:14px;font-weight:500;color:${p.t1};font-family:${ff};letter-spacing:${ls};">${r[0]}</div>
            <div style="font-size:11px;color:${p.t2};margin-top:2px;font-family:${ff};">${r[1]}</div>
          </div>
          ${tog(r[2])}
        </div>`
      ).join('')}
    </div>

    ${sec('AI Processing')}
    <div style="${card}padding:0;">
      ${gradBar}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;">
        <div style="flex:1;margin-right:8px;">
          <div style="font-size:14px;font-weight:500;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Auto Process</div>
          <div style="font-size:11px;color:${p.t2};margin-top:2px;font-family:${ff};">Automatically process photos with default profile</div>
        </div>
        ${tog(false)}
      </div>
    </div>

    ${sec('Maintenance')}
    <div style="${card}padding:0;">
      ${gradBar}
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;${li_bd.replace('border-top','border-bottom')}">
        <span style="font-size:16px;color:${mntTxt};font-family:${ff};">App Permissions</span>
        ${I.chevFwd(p.tm,14)}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;">
        <span style="font-size:16px;color:${mntTxt};font-family:${ff};">Clear Upload History</span>
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:${p.tm};margin:24px 0;font-family:${ff};">FieldCam 1.0.0</div>
  </div>
  ${tabBar(3)}</div></div>

  <!-- PROFILES -->
  <div class="screen-wrapper"><div class="screen-label">Profiles</div>
  <div class="phone" style="background:${p.bg1};font-family:${ff};"><div class="notch"></div>
  <div class="sc">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px;">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:${p.tm};font-family:${ff};">Processing Profiles</div>
      <span style="cursor:pointer;">${I.addCircle(ac,26)}</span>
    </div>
    <div style="height:10px;"></div>
    <div style="margin:0 16px;">
    <div style="${card}padding:0;">
      ${gradBar}
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;">
        <div>
          <div style="font-size:14px;font-weight:600;color:${p.t1};display:flex;align-items:center;gap:6px;font-family:${ff};letter-spacing:${ls};">
            Field Inspection
            <span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:${hex2rgba(p.inf,lt?'0.1':'0.2')};color:${p.inf};">TEAM</span>
          </div>
          <div style="font-size:11px;color:${p.t2};margin-top:2px;font-family:${ff};">Analyze field photos for crop health</div>
        </div>
        ${tog(true)}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;${li_bd}">
        <div>
          <div style="font-size:14px;font-weight:600;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Site Survey</div>
          <div style="font-size:11px;color:${p.t2};margin-top:2px;font-family:${ff};">Document construction site progress</div>
        </div>
        ${tog(false)}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;${li_bd}">
        <div>
          <div style="font-size:14px;font-weight:600;color:${p.t1};display:flex;align-items:center;gap:6px;font-family:${ff};letter-spacing:${ls};">
            Wildlife Log
            <span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:${hex2rgba(p.inf,lt?'0.1':'0.2')};color:${p.inf};">TEAM</span>
            ${I.lock(p.tm,14)}
          </div>
          <div style="font-size:11px;color:${p.t2};margin-top:2px;font-family:${ff};">Identify and catalog wildlife sightings</div>
        </div>
        ${tog(false)}
      </div>
    </div></div>
  </div>
  ${tabBar(2)}</div></div>

  <!-- FOLDER PICKER -->
  <div class="screen-wrapper"><div class="screen-label">Folder Picker</div>
  <div class="phone" style="background:${p.bg1};font-family:${ff};"><div class="notch"></div>
  <div style="padding:8px 16px;display:flex;align-items:center;gap:8px;">
    ${I.chevBack(ac,18)}
    <span style="font-size:16px;font-weight:600;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Select Folder</span>
  </div>
  <div class="sc">
    ${sec('Current Upload Folder')}
    <div style="${card}padding:14px;margin:0 16px 10px;">
      ${gradBar}
      <div style="display:flex;align-items:center;gap:10px;">
        ${I.folder(ac,28)}
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:600;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Field Photos</div>
          <div style="font-size:11px;color:${p.t2};font-family:${ff};">Google Drive</div>
        </div>
        <span style="font-size:13px;color:${(p.g==='openai'&&!lt)?'#10a37f':p.a};font-weight:600;font-family:${ff};">Use</span>
      </div>
    </div>
    <div style="padding:0 16px 10px;">
      <div style="display:flex;align-items:center;justify-content:center;padding:14px 20px;font-size:16px;font-weight:600;cursor:pointer;font-family:${ff};background:${p.bge};color:${p.t1};border-radius:${br};${p.g==='openai'?`border:1px solid ${p.bd};`:''}">Choose Folder</div>
    </div>
    ${sec('Favorites')}
    <div style="${card}padding:0;margin:0 16px 10px;">
      ${gradBar}
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;">
        ${I.star(p.wrn,16)}
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:500;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Site Alpha</div>
          <div style="font-size:11px;color:${p.t2};font-family:${ff};">Google Drive</div>
        </div>
        ${I.chevFwd(p.tm,14)}
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;${li_bd}">
        ${I.star(p.wrn,16)}
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:500;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Spring 2026 Crops</div>
          <div style="font-size:11px;color:${p.t2};font-family:${ff};">OneDrive</div>
        </div>
        ${I.chevFwd(p.tm,14)}
      </div>
    </div>
    ${sec('Recent')}
    <div style="${card}padding:0;margin:0 16px 10px;">
      ${gradBar}
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;">
        ${I.folder(p.tm,16)}
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:500;color:${p.t1};font-family:${ff};letter-spacing:${ls};">West Fence Line</div>
          <div style="font-size:11px;color:${p.t2};font-family:${ff};">Dropbox</div>
        </div>
        ${I.chevFwd(p.tm,14)}
      </div>
    </div>
  </div></div></div>

  <!-- QR SCANNER -->
  <div class="screen-wrapper"><div class="screen-label">QR Scanner</div>
  <div class="phone" style="background:#000;"><div class="notch"></div>
  <div style="padding:8px 16px;display:flex;align-items:center;gap:8px;">
    ${I.chevBack(ac,18)}
    <span style="font-size:16px;font-weight:600;color:#fff;font-family:${ff};letter-spacing:${ls};">Scan QR Code</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
    <div style="width:180px;height:180px;border:3px solid ${(p.g==='openai')?'#10a37f':p.a};border-radius:16px;"></div>
    <div style="font-size:13px;color:#fff;background:rgba(0,0,0,0.6);padding:8px 16px;border-radius:999px;font-family:${ff};">Scanning for QR Codes...</div>
  </div></div></div>

  <!-- PERMISSIONS -->
  <div class="screen-wrapper"><div class="screen-label">Permissions</div>
  <div class="phone" style="background:${p.bg1};font-family:${ff};"><div class="notch"></div>
  <div style="padding:8px 16px;display:flex;align-items:center;gap:8px;">
    ${I.chevBack(ac,18)}
    <span style="font-size:16px;font-weight:600;color:${p.t1};font-family:${ff};letter-spacing:${ls};">Permissions</span>
  </div>
  <div class="sc">
    ${sec('Permissions')}
    <div style="${card}padding:0;margin:0 16px 10px;">
      ${gradBar}
      ${[['Camera',true],['Fine Location',true],['Coarse Location',true],['Notifications',false]].map((r,i)=>
        `<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;${i>0?li_bd:''}">
          <span style="font-size:14px;color:${p.t1};font-family:${ff};">${r[0]}</span>
          ${r[1]?I.checkCircle(p.ok,20):I.closeCircle(p.err,20)}
        </div>`
      ).join('')}
    </div>
    <div style="padding:0 16px;">
      <div style="display:flex;align-items:center;justify-content:center;padding:14px 20px;font-size:14px;font-weight:600;width:100%;cursor:pointer;font-family:${ff};letter-spacing:0.5px;${btnP}border:none;border-radius:${br};">REVIEW PERMISSIONS</div>
    </div>
  </div>
  <div style="flex:1;"></div></div></div>
  `;
}

initTabs();
apply('current');
</script>
</body>
</html>
